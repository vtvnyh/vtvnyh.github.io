<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航主页 | Navigation</title>
    <style>
        /* 全局重置与基础样式 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f5f5f7; /* 浅灰背景，更柔和 */
            color: #333; /* 深灰文字，保证对比度 */
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 头部样式 */
        header {
            text-align: center;
            padding: 80px 20px 40px;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            color: #bfa05f; /* 降低饱和度的金色，更雅致 */
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        p.subtitle {
            color: #999;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        /* 导航容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        /* 卡片样式 - 浅色模式 */
        .nav-card {
            background-color: #ffffff;
            border: 1px solid rgba(0, 0, 0, 0.05); /* 极淡的边框 */
            border-radius: 12px;
            padding: 40px 30px;
            text-decoration: none;
            color: inherit;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03); /* 轻微阴影 */
        }

        /* 卡片悬停效果 */
        .nav-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08); /* 悬停时阴影加深 */
            border-color: transparent;
        }

        /* 卡片标题 */
        .nav-card h2 {
            font-size: 1.5rem;
            font-weight: 500;
            margin-bottom: 10px;
            color: #2c2c2c;
            transition: color 0.3s ease;
        }

        .nav-card:hover h2 {
            color: #bfa05f; /* 悬停时变为金色 */
        }

        /* 卡片描述 */
        .nav-card p {
            font-size: 0.9rem;
            color: #888;
            transition: color 0.3s ease;
        }

        .nav-card:hover p {
            color: #666;
        }

        /* 装饰性线条 - 浅色模式下更细腻 */
        .nav-card::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: #bfa05f;
            transition: width 0.4s ease;
        }

        .nav-card:hover::after {
            width: 100%;
        }

        /* 页脚 */
        footer {
            text-align: center;
            padding: 40px;
            color: #aaa;
            font-size: 0.8rem;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* 响应式调整 */
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>VTV NYH</h1>
        <p class="subtitle">OVO & OVO</p>
    </header>

    <main class="container">
        <!-- 导航卡片 1 -->
        <a href="rgznll/ethics_deep.html" class="nav-card">
            <h2>人工智能伦理</h2>
            <p>分组作业主题网站</p>
        </a>

        <!-- 导航卡片 2 -->
        <a href="./page2.html" class="nav-card">
            <h2>资源库</h2>
            <p>设计素材与技术文档汇总</p>
        </a>

        <!-- 导航卡片 3 -->
        <a href="./page3.html" class="nav-card">
            <h2>数据分析</h2>
            <p>业务报表与可视化大屏</p>
        </a>

        <!-- 导航卡片 4 -->
        <a href="./page4.html" class="nav-card">
            <h2>系统设置</h2>
            <p>用户权限与全局配置管理</p>
        </a>
        
        <!-- 导航卡片 5 -->
        <a href="./page5.html" class="nav-card">
            <h2>外部链接</h2>
            <p>常用第三方服务快捷访问</p>
        </a>

        <!-- 导航卡片 6 -->
        <a href="./page6.html" class="nav-card">
            <h2>关于我们</h2>
            <p>团队介绍与公司最新动态</p>
        </a>
    </main>

    <footer>
        &copy; 2023 Luxury Nav System. All Rights Reserved.
    </footer>

</body>
</html>
